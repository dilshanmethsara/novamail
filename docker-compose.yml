version: '3.8'

services:
  nova-mail:
    build: .
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MAILTM_API_BASE_URL=https://api.mail.tm
      - ADMIN_KEY=nova-mail-admin-2024
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped

